                  sos = [n for n in names if n.endswith(".so")]
              if not sos:
                  print(f"error: wheel has no .so: {whl}", file=sys.stderr)
                  for n in names[:80]:
                      print(f"  {n}", file=sys.stderr)
                  sys.exit(1)
              print(f"ok: {whl} has {len(sos)} .so file(s)")
          PY
        shell: bash

      - uses: actions/upload-artifact@v4
