      - name: Build wheel (pip wheel)
        env:
          PreferredToolArchitecture: x64
        run: |
          rm -rf dist build
          python -m pip wheel . --no-deps -w dist
        shell: bash

      - name: Assert wheel contains at least one .so
        run: |
          python - <<'PY'
          import glob, sys, zipfile
          wheels = sorted(glob.glob("dist/*.whl"))
          if not wheels:
              print("error: no wheel in dist/", file=sys.stderr)
