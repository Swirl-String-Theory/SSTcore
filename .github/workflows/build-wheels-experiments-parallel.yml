                      print(f"  {n}", file=sys.stderr)
                  sys.exit(1)
              print(f"ok: {whl} has {len(sos)} .so file(s)")
          PY
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-parallel-D-py3.12-linux
          path: dist/*.whl
          retention-days: 14
