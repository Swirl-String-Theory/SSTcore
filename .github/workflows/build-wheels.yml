# Release wheel matrix (Linux / Windows / macOS) and PyPI upload on tags/releases.
# Linux experiments: build-wheels-experiments-parallel.yml (push). Manual: build-wheels-approach-{A..D}.yml.
name: Build Wheels

env:
  SETUPTOOLS_PIN: "setuptools==75.8.2"
  SST_SKIP_NPM_FOR_PYTHON_BUILD: "1"

on:
  release:
    types: [published]
  workflow_dispatch:
  push:
    branches: [main, master]
    tags:
      - 'v*'

jobs:
  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux toolchain
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
        shell: bash

      - name: Use x64 native MSVC (Windows)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "${{ env.SETUPTOOLS_PIN }}" wheel pybind11 numpy
        shell: bash

      - name: Build wheel
        env:
          PreferredToolArchitecture: x64
        run: |
          # Match wheels-experiments-parallel / approach A-D: clean trees so setuptools + wheel
          # staging never picks up stale python_build/ or node-gyp build/.
          rm -rf dist build python_build
          # Use setup.py bdist_wheel so the legacy backend always runs the same distutils
          # install graph as a local `python setup.py bdist_wheel` (avoids rare PEP 517 /
          # frontend paths that produced metadata-only wheels on Linux).
          python setup.py bdist_wheel --dist-dir dist
        shell: bash

      - name: Repair Linux wheels with auditwheel
        if: matrix.os == 'ubuntu-latest'
        run: |
          python -m pip install auditwheel
          python - <<'PY'
          import glob, sys, zipfile
          for whl in sorted(glob.glob("dist/*.whl")):
              with zipfile.ZipFile(whl) as z:
                  names = z.namelist()
                  sos = [n for n in names if n.endswith(".so")]
              if not sos:
                  print(f"error: wheel has no .so (auditwheel will fail): {whl}", file=sys.stderr)
                  for n in names[:80]:
                      print(f"  {n}", file=sys.stderr)
                  sys.exit(1)
          PY
          auditwheel repair dist/*.whl -w dist/
          rm -f dist/*-linux_*.whl
        shell: bash

      - name: Repair macOS wheels with delocate
        if: matrix.os == 'macos-latest'
        run: |
          python -m pip install delocate
          delocate-wheel -w dist/fixed -v dist/*.whl
          mv dist/fixed/*.whl dist/
          rm -rf dist/fixed
          rm -f dist/*-macosx_*.whl || true
        shell: bash

      - name: Smoke test wheel (import extensions)
        run: |
          python -m pip install --upgrade pip
          python -m pip install "${GITHUB_WORKSPACE}"/dist/*.whl
          # Import from outside the repo: cwd on sys.path would load ./SSTcore (sources only,
          # no .so) and shadow the wheel installed in site-packages.
          cd "$(mktemp -d)"
          # _native and _bindings each register the same pybind11 types; one process cannot import both.
          python -c "import SSTcore._native"
          python -c "import SSTcore._bindings"
        shell: bash

      - name: Store wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl
          retention-days: 30

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          # Same imports as setup.py / pyproject build-system (needed to load setup.py for sdist).
          python -m pip install build "${{ env.SETUPTOOLS_PIN }}" wheel pybind11 numpy packaging

      - name: Build source distribution
        env:
          SST_SKIP_NPM_FOR_PYTHON_BUILD: "1"
        run: |
          rm -rf dist build python_build
          python -m build --sdist
        shell: bash

      - name: Store sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 30

  upload-pypi:
    name: Upload to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
