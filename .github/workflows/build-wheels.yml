name: Build Wheels

on:
  release:
    types: [published]
  workflow_dispatch:
  push:
    branches: [main, master]
    tags:
      - 'v*'

jobs:
  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Use x64 native MSVC (Windows)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel setuptools pybind11 numpy
        shell: bash

      - name: Install Linux toolchain
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
        shell: bash

      - name: Build wheel
        env:
          # Use 64-bit-hosted MSVC inside PEP 517 env (avoids C1060 on huge generated TU)
          PreferredToolArchitecture: x64
        run: |
          # --no-isolation: build from full checkout on the runner (isolated PEP 517
          # copies via git archive and can omit files needed for the C++ extension).
          python -m build --wheel --no-isolation
        shell: bash

      - name: Repair Linux wheels with auditwheel
        if: matrix.os == 'ubuntu-latest'
        run: |
          pip install auditwheel
          python - <<'PY'
          import glob, sys, zipfile
          for whl in glob.glob("dist/*.whl"):
              with zipfile.ZipFile(whl) as z:
                  sos = [n for n in z.namelist() if n.endswith(".so")]
              if not sos:
                  print(f"error: wheel has no .so (extensions missing): {whl}", file=sys.stderr)
                  sys.exit(1)
          PY
          auditwheel repair dist/*.whl -w dist/
          rm -f dist/*-linux_*.whl
        shell: bash

      - name: Repair macOS wheels with delocate
        if: matrix.os == 'macos-latest'
        run: |
          pip install delocate
          delocate-wheel -w dist/fixed -v dist/*.whl
          mv dist/fixed/*.whl dist/
          rm -rf dist/fixed
          rm dist/*-macosx_*.whl || true
        shell: bash

      - name: Store wheel artifact
        uses: actions/upload-artifact@v6
        with:
          name: wheel-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl
          retention-days: 30

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build setuptools

      - name: Build source distribution
        run: |
          python -m build --sdist

      - name: Store sdist artifact
        uses: actions/upload-artifact@v6
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 30

  upload-pypi:
    name: Upload to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v6
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist

      - uses: actions/download-artifact@v6
        with:
          name: sdist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

