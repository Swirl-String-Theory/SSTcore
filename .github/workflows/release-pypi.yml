# Manual PyPI upload only. Use when npm already succeeded (or you only want wheels) so tag/release
# events do not couple the two registries. Requires secrets.PYPI_API_TOKEN.
name: Release (PyPI — manual)

env:
  SETUPTOOLS_PIN: "setuptools==75.8.2"
  SST_SKIP_NPM_FOR_PYTHON_BUILD: "1"

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: 'Git ref to build and upload (branch, tag, or SHA, e.g. main, master, v0.2.0)'
        required: true
        default: 'main'
      dry_run:
        description: 'If true, build wheels/sdist and attach artifacts only (no PyPI upload)'
        type: boolean
        default: false

concurrency:
  group: release/pypi-manual
  cancel-in-progress: false

jobs:
  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Install Linux toolchain
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
        shell: bash

      - name: Use x64 native MSVC (Windows)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "${{ env.SETUPTOOLS_PIN }}" wheel pybind11 numpy
        shell: bash

      - name: Build wheel
        env:
          PreferredToolArchitecture: x64
        run: |
          rm -rf dist build python_build
          python setup.py bdist_wheel --dist-dir dist
        shell: bash

      - name: Repair Linux wheels with auditwheel
        if: matrix.os == 'ubuntu-latest'
        run: |
          python -m pip install auditwheel
          python - <<'PY'
          import glob, sys, zipfile
          for whl in sorted(glob.glob("dist/*.whl")):
              with zipfile.ZipFile(whl) as z:
                  names = z.namelist()
                  sos = [n for n in names if n.endswith(".so")]
              if not sos:
                  print(f"error: wheel has no .so (auditwheel will fail): {whl}", file=sys.stderr)
                  for n in names[:80]:
                      print(f"  {n}", file=sys.stderr)
                  sys.exit(1)
          PY
          auditwheel repair dist/*.whl -w dist/
          rm -f dist/*-linux_*.whl
        shell: bash

      - name: Repair macOS wheels with delocate
        if: matrix.os == 'macos-latest'
        run: |
          python -m pip install delocate
          delocate-wheel -w dist/fixed -v dist/*.whl
          mv dist/fixed/*.whl dist/
          rm -rf dist/fixed
        shell: bash

      - name: Smoke test wheel (import package)
        run: |
          python -m pip install --upgrade pip
          python -m pip install "${GITHUB_WORKSPACE}"/dist/*.whl
          cd "$(mktemp -d)"
          python -c "import SSTcore; print('smoke ok:', SSTcore.__name__)"
        shell: bash

      - name: Run Python tests (pytest against installed wheel)
        env:
          SST_WHEEL_TEST: "1"
        run: |
          python -m pip install pytest
          cd "$(mktemp -d)"
          python -m pip install --force-reinstall "${GITHUB_WORKSPACE}"/dist/*.whl
          pytest "${GITHUB_WORKSPACE}/tests" \
            --rootdir="${GITHUB_WORKSPACE}" \
            --ignore="${GITHUB_WORKSPACE}/tests/TestLibraryGravityModification.py" \
            --ignore="${GITHUB_WORKSPACE}/tests/TestLibraryTrefoil.py" \
            -q --tb=short
        shell: bash

      - name: Store wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl
          retention-days: 30

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build "${{ env.SETUPTOOLS_PIN }}" wheel pybind11 numpy packaging

      - name: Build source distribution
        env:
          SST_SKIP_NPM_FOR_PYTHON_BUILD: "1"
        run: |
          rm -rf dist build python_build
          python -m build --sdist
        shell: bash

      - name: Store sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 30

  upload-pypi:
    name: Upload to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: ${{ inputs.dry_run == false }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  collect-artifacts:
    name: Dry run — artifacts only
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: ${{ inputs.dry_run == true }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: List dist (no upload)
        run: |
          echo "dry_run=true: skipped PyPI upload."
          ls -la dist/
