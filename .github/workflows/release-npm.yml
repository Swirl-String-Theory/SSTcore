# Manual npm publish only. Use when PyPI already succeeded (or you only want JS) so tag/release
# events do not couple the two registries. Requires secrets.NPM_TOKEN.
name: Release (npm — manual)

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: 'Git ref to checkout and publish (branch, tag, or SHA, e.g. master, main, v0.8.0)'
        required: true
        default: 'master'
      dry_run:
        description: 'If true, build and npm pack --dry-run only (no npm publish)'
        type: boolean
        default: false

concurrency:
  group: release/npm-manual
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential python3 ninja-build

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Install npm dependencies
        run: npm ci

      - name: Show version
        id: meta
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing npm package ${NAME}@${VERSION} (ref: ${{ inputs.git_ref }})"
          if [ "$NAME" != "sst-core" ]; then
            echo "ERROR: package.json name must be 'sst-core' (got: $NAME)"
            exit 1
          fi

      - name: Generate embedded knot files
        shell: bash
        run: |
          rm -rf build_node build
          mkdir -p build/generated
          cmake -B build_node -S . -DSST_BUILD_PYTHON_BINDINGS=OFF

      - name: Build package
        run: npm run build:all

      - name: Stage linux prebuild (optional consumer fast-path)
        shell: bash
        run: |
          mkdir -p prebuilds/linux-x64
          if [ -f build/Release/sstcore.node ]; then
            cp -f build/Release/sstcore.node prebuilds/linux-x64/sstcore.node
          elif [ -f build_node/Release/sstcore.node ]; then
            cp -f build_node/Release/sstcore.node prebuilds/linux-x64/sstcore.node
          else
            echo "No sstcore.node found to stage as prebuild (source install still OK)"
          fi

      - name: Run tests
        run: npm test

      - name: Check package contents
        run: |
          npm pack --dry-run --json > pack-dry.json
          node scripts/check_npm_pack_size.js --json pack-dry.json

      - name: Verify NPM_TOKEN
        if: ${{ inputs.dry_run == false }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "ERROR: secrets.NPM_TOKEN is empty. Add a granular npm token as GitHub Actions secret NPM_TOKEN."
            exit 1
          fi
          echo "NPM_TOKEN is set (length=${#NODE_AUTH_TOKEN})"

      - name: Publish to npm
        if: ${{ inputs.dry_run == false }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry run summary
        if: ${{ inputs.dry_run == true }}
        run: |
          echo "dry_run=true: skipped npm publish. Package ${{ steps.meta.outputs.name }}@${{ steps.meta.outputs.version }} — verify pack-size output above."
