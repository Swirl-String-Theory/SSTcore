# Experimental: PEP 517 `python -m build --wheel` (setuptools.build_meta:__legacy__).
# Manual only — parallel suite on push: build-wheels-experiments-parallel.yml
# Does not upload to PyPI. See build-wheels.yml for release builds.
name: "Wheels experiment C (PEP 517 build)"

on:
  workflow_dispatch:

concurrency:
  group: wheels-exp-C-${{ github.ref }}
  cancel-in-progress: false

env:
  SETUPTOOLS_PIN: "setuptools==75.8.2"

jobs:
  linux-pep517:
    name: Approach C — python -m build --wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
        shell: bash

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build "${{ env.SETUPTOOLS_PIN }}" wheel pybind11 numpy
        shell: bash

      - name: Build wheel (PEP 517)
        env:
          PreferredToolArchitecture: x64
        run: |
          rm -rf dist
          python -m build --wheel -o dist
        shell: bash

      - name: Assert wheel contains at least one .so
        run: |
          python - <<'PY'
          import glob, sys, zipfile
          wheels = sorted(glob.glob("dist/*.whl"))
          if not wheels:
              print("error: no wheel in dist/", file=sys.stderr)
              sys.exit(1)
          for whl in wheels:
              with zipfile.ZipFile(whl) as z:
                  names = z.namelist()
                  sos = [n for n in names if n.endswith(".so")]
              if not sos:
                  print(f"error: wheel has no .so: {whl}", file=sys.stderr)
                  for n in names[:80]:
                      print(f"  {n}", file=sys.stderr)
                  sys.exit(1)
              print(f"ok: {whl} has {len(sos)} .so file(s)")
          PY
        shell: bash

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-approach-C-py3.12-linux
          path: dist/*.whl
          retention-days: 14
