# Experimental: Linux wheel diagnostics (keep-temp, find .so, zip listing).
# Manual only — parallel suite on push: build-wheels-experiments-parallel.yml
# Does not upload to PyPI. See build-wheels.yml for release builds.
name: "Wheels experiment A (diagnostics)"

on:
  workflow_dispatch:

concurrency:
  group: wheels-exp-A-${{ github.ref }}
  cancel-in-progress: false

env:
  SETUPTOOLS_PIN: "setuptools==75.8.2"

jobs:
  linux-diagnostics:
    name: Approach A — diagnostics + bdist_wheel --keep-temp
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
        shell: bash

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "${{ env.SETUPTOOLS_PIN }}" wheel pybind11 numpy
        shell: bash

      - name: Environment and setup.py proof
        run: |
          python - <<'PY'
          import pathlib
          import setuptools
          print("setuptools", setuptools.__version__)
          text = pathlib.Path("setup.py").read_text(encoding="utf-8")
          assert "SSTBdistWheel" in text, "setup.py should define SSTBdistWheel"
          assert "bdist_wheel" in text and "SSTBdistWheel" in text, "cmdclass should register bdist_wheel"
          print("setup.py: SSTBdistWheel present")
          PY
          grep -n "class SSTBdistWheel" setup.py || true
          grep -n "bdist_wheel" setup.py | head -20
        shell: bash

      - name: Build wheel (keep temp tree)
        env:
          PreferredToolArchitecture: x64
        run: |
          rm -rf dist build
          python setup.py bdist_wheel --dist-dir dist --keep-temp
        shell: bash

      - name: Find built extensions and staging tree
        run: |
          echo "=== find .so under build ==="
          find build -name '*.so' -print 2>/dev/null || true
          echo "=== find .so under . (maxdepth 8) ==="
          find . -maxdepth 8 -name '*.so' -print 2>/dev/null | head -50
          echo "=== dist ==="
          ls -la dist || true
        shell: bash

      - name: List wheel members (zipfile)
        run: |
          python - <<'PY'
          import glob, zipfile
          for whl in sorted(glob.glob("dist/*.whl")):
              print("---", whl)
              with zipfile.ZipFile(whl) as z:
                  for n in z.namelist()[:120]:
                      print(" ", n)
                  if len(z.namelist()) > 120:
                      print("  ...")
          PY
        shell: bash

      - name: Assert wheel contains at least one .so
        run: |
          python - <<'PY'
          import glob, sys, zipfile
          wheels = sorted(glob.glob("dist/*.whl"))
          if not wheels:
              print("error: no wheel in dist/", file=sys.stderr)
              sys.exit(1)
          for whl in wheels:
              with zipfile.ZipFile(whl) as z:
                  names = z.namelist()
                  sos = [n for n in names if n.endswith(".so")]
              if not sos:
                  print(f"error: wheel has no .so: {whl}", file=sys.stderr)
                  for n in names[:80]:
                      print(f"  {n}", file=sys.stderr)
                  sys.exit(1)
              print(f"ok: {whl} has {len(sos)} .so file(s)")
          PY
        shell: bash

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-approach-A-py3.12-linux
          path: dist/*.whl
          retention-days: 14
